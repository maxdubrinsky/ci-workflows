name: TestFlight Feedback Processing

# Caller for the shared triage-testflight reusable workflow.
# Generated by ci-workflows/bootstrap/bootstrap-feedback.sh.
# Edit the `with:` block if you need to override defaults; everything
# else lives in ci-workflows/.github/workflows/triage-testflight.yml.

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log without posting to Linear"
        type: boolean
        default: false
      window_hours:
        description: "Look-back window (hours)"
        type: string
        default: "2"

permissions:
  contents: read

jobs:
  triage:
    uses: msdubrin/ci-workflows/.github/workflows/triage-testflight.yml@main
    with:
      app_name: "__APP_NAME__"
      linear_project: "__LINEAR_PROJECT__"
      ticket_prefix: "__TICKET_PREFIX__"
      app_module: "__APP_MODULE__"
      window_hours: ${{ inputs.window_hours || '2' }}
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      TESTFLIGHT_KEY_ID:         ${{ secrets.TESTFLIGHT_KEY_ID }}
      TESTFLIGHT_ISSUER_ID:      ${{ secrets.TESTFLIGHT_ISSUER_ID }}
      TESTFLIGHT_PRIVATE_KEY_B64: ${{ secrets.TESTFLIGHT_PRIVATE_KEY_B64 }}
      TESTFLIGHT_BUNDLE_ID:      ${{ secrets.TESTFLIGHT_BUNDLE_ID }}
      LINEAR_API_TOKEN:          ${{ secrets.LINEAR_API_TOKEN }}
      LINEAR_TEAM_ID:            ${{ secrets.LINEAR_TEAM_ID }}
      CLAUDE_CODE_OAUTH_TOKEN:   ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
