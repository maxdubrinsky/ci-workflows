name: Triage TestFlight Feedback

# Reusable workflow. Call it from per-app repos with `uses:` + `workflow_call`.
# See bootstrap/caller-workflow.template.yml for the caller shape.

on:
  workflow_call:
    inputs:
      app_name:
        description: "Human-readable app name (used in logs + Linear titles)"
        required: true
        type: string
      linear_project:
        description: "Linear project name, e.g. 'Local Tasks'"
        required: true
        type: string
      ticket_prefix:
        description: "Linear team key, e.g. 'MSD' or 'MTM'"
        required: true
        type: string
      app_module:
        description: "Swift module name for crash-frame heuristic, e.g. 'LocalTasks'"
        required: true
        type: string
      window_hours:
        description: "Look-back window for TestFlight feedback (hours)"
        required: false
        type: string
        default: "2"
      dry_run:
        description: "Log what would be created without posting to Linear"
        required: false
        type: boolean
        default: false
      ci_workflows_ref:
        description: "Git ref of ci-workflows to check out for prompt template"
        required: false
        type: string
        default: "main"
    secrets:
      TESTFLIGHT_KEY_ID:
        required: true
      TESTFLIGHT_ISSUER_ID:
        required: true
      TESTFLIGHT_PRIVATE_KEY_B64:
        required: true
      TESTFLIGHT_BUNDLE_ID:
        required: true
      LINEAR_API_TOKEN:
        required: true
      LINEAR_TEAM_ID:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: triage-testflight-${{ inputs.app_name }}
  cancel-in-progress: false

jobs:
  sync-and-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ASC_KEY_ID: ${{ secrets.TESTFLIGHT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.TESTFLIGHT_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.TESTFLIGHT_PRIVATE_KEY_B64 }}
      ASC_BYPASS_KEYCHAIN: "true"
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_TOKEN }}
      TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
      LINEAR_PROJECT: ${{ inputs.linear_project }}
      BUNDLE_ID: ${{ secrets.TESTFLIGHT_BUNDLE_ID }}
      WINDOW_HOURS: ${{ inputs.window_hours }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Checkout ci-workflows (for prompt template)
        uses: actions/checkout@v4
        with:
          repository: maxdubrinsky/ci-workflows
          ref: ${{ inputs.ci_workflows_ref }}
          path: .ci-workflows

      - name: Install asc + go-linear
        run: |
          set -euo pipefail
          ASC_VER=1.2.6
          GL_VER=v2.2.1
          ASC_SHA=2cf40af473942a75a0fba705a5587adde8b639648bcbdca59a0eb5972073da59
          GL_SHA=67ddf00743d291ca9f56316ba362079482551a11ed4f574baa03f922bc1da4e8

          curl -fsSL "https://github.com/rorkai/App-Store-Connect-CLI/releases/download/${ASC_VER}/asc_${ASC_VER}_linux_amd64" -o /usr/local/bin/asc
          echo "${ASC_SHA}  /usr/local/bin/asc" | sha256sum -c -
          chmod +x /usr/local/bin/asc

          curl -fsSL "https://github.com/chainguard-sandbox/go-linear/releases/download/${GL_VER}/go-linear-${GL_VER}-linux-amd64" -o /usr/local/bin/go-linear
          echo "${GL_SHA}  /usr/local/bin/go-linear" | sha256sum -c -
          chmod +x /usr/local/bin/go-linear

          asc version
          go-linear --version

      - name: Sync TestFlight feedback to Linear
        id: sync
        run: |
          set -euo pipefail

          APP_ID=$(asc apps list --bundle-id "$BUNDLE_ID" --output json | jq -r '.data[0].id // empty')
          [[ -n "$APP_ID" ]] || { echo "::error::No app for bundleId=$BUNDLE_ID"; exit 1; }
          since_epoch=$(date -u -d "${WINDOW_HOURS} hours ago" +%s)
          echo "Resolved app_id=$APP_ID window=${WINDOW_HOURS}h since=$(date -u -d "@$since_epoch" -Iseconds) dry_run=${DRY_RUN}"

          attachments_for_url() {
            # No URL to dedupe against â†’ treat as "not yet linked".
            [[ -n "$1" && "$1" != "null" ]] || { echo 0; return 0; }
            # Drop -f so an HTTP/GraphQL error body is still parsed (not fatal);
            # null-guard the path so a missing/errored payload yields 0, not a
            # jq "Cannot iterate over null" crash under `set -e`.
            curl -sS -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg u "$1" '{query:"query($u:String!){attachmentsForURL(url:$u,first:1){nodes{id}}}",variables:{u:$u}}')" \
              | jq -r '(.data.attachmentsForURL.nodes // []) | length' 2>/dev/null || echo 0
          }

          created=0; skipped=0; failed=0

          process_kind() {
            local kind="$1"
            local ndjson="/tmp/${kind}.ndjson"

            asc testflight "$kind" list --app "$APP_ID" --paginate --sort -createdDate --output json \
              | jq -c --argjson since "$since_epoch" --arg kind "$kind" '
                  (.data // [])[]
                  | select(.attributes.createdDate != null)
                  | (.attributes.createdDate | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601) as $ts
                  | select($ts >= $since)
                  | {id, kind: $kind, url: .links.self, attrs: .attributes}
                ' > "$ndjson"

            local count
            count=$(wc -l < "$ndjson" | tr -d ' ')
            echo "  ${kind}: ${count} within window"

            local item id url comment first title meta description issue_id log
            while IFS= read -r item; do
              id=$(jq -r '.id' <<<"$item")
              url=$(jq -r '.url' <<<"$item")

              if [[ "$(attachments_for_url "$url")" != "0" ]]; then
                echo "    $id: already linked, skip"
                skipped=$((skipped + 1))
                continue
              fi

              comment=$(jq -r '.attrs.comment // ""' <<<"$item")
              first=$(printf '%s' "$comment" | head -n1 | cut -c1-80)
              title="[TestFlight ${kind}] ${first:-${kind} feedback} (${id: -12})"

              meta=$(jq -r '
                (.attrs // {}) | to_entries
                | map(select(.key | test("^(createdDate|email|deviceModel|osVersion|connectionType|batteryPercentage|architecture|appUptimeInMilliseconds|diskBytesAvailable|diskBytesTotal)$")))
                | map("- **\(.key):** \(.value)") | join("\n")
              ' <<<"$item")

              description="**Kind:** ${kind}"$'\n\n'
              [[ -n "$comment" ]] && description+="### Comment"$'\n'"${comment}"$'\n\n'
              [[ -n "$meta" ]]    && description+="### Metadata"$'\n'"${meta}"$'\n\n'

              if [[ "$kind" == "crashes" ]]; then
                log=$(asc testflight crashes log --submission-id "$id" --output json | jq -r '.data.attributes.logText // ""')
                if [[ -n "$log" ]]; then
                  description+="### Crash log"$'\n''```'$'\n'"$(printf '%s' "$log" | head -c 50000)"$'\n''```'$'\n'
                fi
              fi

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "    $id: [dry-run] would create â€” $title"
                created=$((created + 1))
                continue
              fi

              issue_json=$(go-linear issue create \
                --team "$TEAM_ID" \
                --project "$LINEAR_PROJECT" \
                --state "Triage" \
                --title "$title" \
                --description "$description" 2>&1) || {
                  echo "::error::issue create failed for $id: $issue_json"
                  failed=$((failed + 1)); continue
                }
              issue_id=$(jq -r '.identifier // .id // empty' <<<"$issue_json" 2>/dev/null || true)
              if [[ -z "$issue_id" ]]; then
                echo "::error::could not parse issue id from create output for $id: $issue_json"
                failed=$((failed + 1)); continue
              fi

              if ! go-linear attachment link-url \
                --issue "$issue_id" \
                --url "$url" \
                --title "App Store Connect: ${kind} ${id}" >/dev/null 2>&1; then
                echo "::warning::issue $issue_id created but attachment link-url failed for $id"
                failed=$((failed + 1)); continue
              fi

              echo "    $id: created $issue_id"
              created=$((created + 1))
            done < "$ndjson"
          }

          process_kind feedback
          process_kind crashes

          echo "::notice::Sync done. created=$created skipped=$skipped failed=$failed"
          [[ "$failed" -eq 0 ]] || exit 1

      - name: Find untriaged tickets
        id: untriaged
        if: always()
        run: |
          set -euo pipefail

          # Sentinel: state=Triage AND priority=0 (None) AND title starts with
          # "[TestFlight ". The apply step below sets a non-zero priority as its
          # LAST mutation, so a half-applied ticket (still priority 0) is retried.
          curl -fsS -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$LINEAR_PROJECT" '{query:"query($p:String!){issues(filter:{project:{name:{eq:$p}},state:{name:{eq:\"Triage\"}},priority:{eq:0},title:{startsWith:\"[TestFlight \"}},first:50){nodes{id identifier title description createdAt}}}",variables:{p:$p}}')" \
            | jq '.data.issues.nodes' > "$RUNNER_TEMP/targets.json"

          count=$(jq 'length' "$RUNNER_TEMP/targets.json")
          ids=$(jq -r '.[].identifier' "$RUNNER_TEMP/targets.json" | tr '\n' ' ' | sed 's/ $//')
          echo "Found ${count} ticket(s) needing triage: ${ids:-(none)}"
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      # Triage WITHOUT an MCP server: Claude reasons over context we fetch and
      # returns a strict JSON decision array; this step then applies each
      # decision to Linear via GraphQL (the same REST/GraphQL seam the sync step
      # uses). No stdio MCP = nothing to hang on. Auth for Claude is the Max-plan
      # OAuth token via the headless `claude` CLI.
      - name: Triage tickets and apply to Linear
        if: steps.untriaged.outputs.count != '0'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APP_NAME: ${{ inputs.app_name }}
          APP_MODULE: ${{ inputs.app_module }}
          TICKET_PREFIX: ${{ inputs.ticket_prefix }}
        run: |
          set -euo pipefail

          gql() { # $1=query  $2=variables(JSON) ; prints .data, fails on errors
            local resp
            resp=$(curl -fsS -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$1" --argjson v "$2" '{query:$q,variables:$v}')")
            if [[ "$(jq 'has("errors")' <<<"$resp")" == "true" ]]; then
              echo "::error::GraphQL error: $(jq -c '.errors' <<<"$resp")" >&2
              return 1
            fi
            jq '.data' <<<"$resp"
          }

          # ---- dupe context: open + recently-completed (<=21d), minus targets ----
          since=$(date -u -d '21 days ago' +%Y-%m-%dT%H:%M:%S.000Z)
          targets_ids=$(jq '[.[].identifier]' "$RUNNER_TEMP/targets.json")
          allnodes=$(gql 'query($p:String!){issues(filter:{project:{name:{eq:$p}}},first:250){nodes{id identifier title state{name type} completedAt}}}' \
            "$(jq -n --arg p "$LINEAR_PROJECT" '{p:$p}')" | jq '.issues.nodes')
          jq -n --argjson a "$allnodes" --arg since "$since" --argjson t "$targets_ids" '
            $a
            | map(select(.identifier as $id | ($t | index($id)) | not))
            | map(select(
                (.state.type as $ty | (["triage","backlog","unstarted","started"] | index($ty)))
                or (.state.type=="completed" and .completedAt!=null and .completedAt>=$since)))
            | map({id:.identifier, title, state:.state.name, completedAt:.completedAt})
          ' > "$RUNNER_TEMP/context.json"
          echo "dupe-context: $(jq length "$RUNNER_TEMP/context.json") candidate(s)"

          # identifier -> UUID map (targets + all candidates) for the apply step.
          jq -n --argjson a "$allnodes" --argjson t "$(cat "$RUNNER_TEMP/targets.json")" \
            '($a + $t) | map({(.identifier): .id}) | add // {}' > "$RUNNER_TEMP/uuidmap.json"

          # ---- assemble the prompt (rules + data) ----
          rendered=$(sed \
            -e "s|{{ticket_prefix}}|${TICKET_PREFIX}|g" \
            -e "s|{{linear_project}}|${LINEAR_PROJECT}|g" \
            -e "s|{{linear_team_id}}|${TEAM_ID}|g" \
            -e "s|{{app_module}}|${APP_MODULE}|g" \
            -e "s|{{app_name}}|${APP_NAME}|g" \
            .ci-workflows/prompts/triage.md)
          {
            printf 'Triage the following %s ticket(s) and return the JSON array.\n\n' "$APP_NAME"
            printf '%s\n\n## TICKETS\n\n```json\n' "$rendered"
            jq '[.[] | {ticket_id: .identifier, title, description}]' "$RUNNER_TEMP/targets.json"
            printf '\n```\n\n## DUPE_CONTEXT\n\n```json\n'
            cat "$RUNNER_TEMP/context.json"
            printf '\n```\n'
          } > "$RUNNER_TEMP/prompt.txt"

          # ---- run Claude headless (no tools, no MCP â€” pure reasoning) ----
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          claude --version
          raw=$(cd "$RUNNER_TEMP" && timeout 360 claude -p --output-format json --max-turns 1 < "$RUNNER_TEMP/prompt.txt") || {
            echo "::error::claude run failed or timed out"; exit 1; }
          if [[ "$(jq -r '.is_error // false' <<<"$raw")" == "true" ]]; then
            echo "::error::claude returned an error: $(jq -r '.result // .error // ""' <<<"$raw")"; exit 1
          fi
          # Strip optional ```json fences, then require a JSON array.
          jq -r '.result // ""' <<<"$raw" \
            | sed -e 's/^[[:space:]]*```[a-zA-Z]*[[:space:]]*//' -e 's/[[:space:]]*```[[:space:]]*$//' \
            > "$RUNNER_TEMP/decisions.json"
          if ! jq -e 'type=="array"' "$RUNNER_TEMP/decisions.json" >/dev/null 2>&1; then
            echo "::error::model did not return a JSON array:"; cat "$RUNNER_TEMP/decisions.json"; exit 1
          fi
          echo "parsed $(jq length "$RUNNER_TEMP/decisions.json") decision(s)"

          # ---- resolve team label + state name->id maps ----
          maps=$(gql 'query($t:String!){team(id:$t){labels(first:250){nodes{id name}} states(first:50){nodes{id name}}}}' \
            "$(jq -n --arg t "$TEAM_ID" '{t:$t}')")
          label_id() { jq -r --arg n "$1" '.team.labels.nodes[]|select(.name==$n)|.id' <<<"$maps" | head -n1; }
          state_id() { jq -r --arg n "$1" '.team.states.nodes[]|select(.name==$n)|.id' <<<"$maps" | head -n1; }
          declare -A PRI=( [Urgent]=1 [High]=2 [Medium]=3 [Low]=4 )

          # ---- apply each decision ----
          applied=0; failed=0
          n=$(jq 'length' "$RUNNER_TEMP/decisions.json")
          for ((k=0; k<n; k++)); do
            d=$(jq ".[$k]" "$RUNNER_TEMP/decisions.json")
            tid=$(jq -r '.ticket_id' <<<"$d")
            cat=$(jq -r '.category' <<<"$d")
            pri=$(jq -r '.priority' <<<"$d")
            tstate=$(jq -r '.target_state' <<<"$d")
            dup=$(jq -r '.duplicate_of // empty' <<<"$d")
            summary=$(jq -r '.summary' <<<"$d")
            rationale=$(jq -r '.rationale' <<<"$d")

            uuid=$(jq -r --arg i "$tid" '.[]|select(.identifier==$i)|.id' "$RUNNER_TEMP/targets.json")
            lid=$(label_id "$cat"); sid=$(state_id "$tstate"); pnum=${PRI[$pri]:-3}
            if [[ -z "$uuid" || -z "$lid" || -z "$sid" ]]; then
              echo "::error::$tid: unresolved uuid/label/state (uuid='$uuid' $cat->'$lid' $tstate->'$sid')"; failed=$((failed+1)); continue
            fi

            dupline=""; [[ -n "$dup" && "$tstate" == "Duplicate" ]] && dupline=" Â· **Duplicate of:** $dup"
            body=$(printf '**Auto-triage**\n\n**Summary:** %s\n\n**Category:** %s Â· **Priority:** %s Â· **State:** %s%s\n\n**Rationale:** %s' \
              "$summary" "$cat" "$pri" "$tstate" "$dupline" "$rationale")

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "  [dry-run] $tid -> $cat / $pri / $tstate${dup:+ (dup of $dup)}"
              applied=$((applied+1)); continue
            fi

            # 1) state + category label
            gql 'mutation($id:String!,$s:String!,$l:[String!]){issueUpdate(id:$id,input:{stateId:$s,labelIds:$l}){success}}' \
              "$(jq -n --arg id "$uuid" --arg s "$sid" --arg l "$lid" '{id:$id,s:$s,l:[$l]}')" >/dev/null \
              || { echo "::error::$tid: state/label update failed"; failed=$((failed+1)); continue; }

            # 2) duplicate relation (best effort)
            if [[ "$tstate" == "Duplicate" && -n "$dup" ]]; then
              dupuuid=$(jq -r --arg i "$dup" '.[$i] // empty' "$RUNNER_TEMP/uuidmap.json")
              if [[ -n "$dupuuid" ]]; then
                gql 'mutation($i:String!,$r:String!,$t:IssueRelationType!){issueRelationCreate(input:{issueId:$i,relatedIssueId:$r,type:$t}){success}}' \
                  "$(jq -n --arg i "$uuid" --arg r "$dupuuid" '{i:$i,r:$r,t:"duplicate"}')" >/dev/null \
                  || echo "::warning::$tid: duplicate relation failed"
              else
                echo "::warning::$tid: duplicate_of $dup not in context; skipping relation"
              fi
            fi

            # 3) comment
            gql 'mutation($i:String!,$b:String!){commentCreate(input:{issueId:$i,body:$b}){success}}' \
              "$(jq -n --arg i "$uuid" --arg b "$body" '{i:$i,b:$b}')" >/dev/null \
              || echo "::warning::$tid: comment failed"

            # 4) priority LAST â€” flips the ticket out of the untriaged sentinel
            gql 'mutation($id:String!,$p:Int!){issueUpdate(id:$id,input:{priority:$p}){success}}' \
              "$(jq -n --arg id "$uuid" --argjson p "$pnum" '{id:$id,p:$p}')" >/dev/null \
              || { echo "::error::$tid: priority update failed"; failed=$((failed+1)); continue; }

            echo "  $tid -> $cat / $pri / $tstate${dup:+ (dup of $dup)}"
            applied=$((applied+1))
          done
          echo "::notice::Triage applied=$applied failed=$failed"
          [[ "$failed" -eq 0 ]] || exit 1
